<div class="login-container">
    <h2>Authentication</h2>

    @if(message){
    <div class="alert-message" [ngClass]="{'error': isError, 'success': !isError}">
        {{message}}
    </div>
    }

    <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" [(ngModel)]="loginData.email" placeholder="name@email.com" [disabled]="isLoading">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="loginData.password" placeholder="Ex: Password1234%" [disabled]="isLoading">
    </div>

    <button class="btn-submit" (click)="onLogin()" [disabled]="isLoading">
        @if(isLoading)
        {
            Loading...
        }
        @else
        {
            Login
        }
    </button>
    <p class="auth-link">
        Don't have an account yet? <a routerLink="/register">Register</a>
    </p>
</div>
