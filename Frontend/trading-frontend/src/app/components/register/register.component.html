<div class="register-container">
    <h2>Create Trading Account</h2>

    @if(message)
    {
    <div class="alert-message" [ngClass]="{'error':isError, 'success':!isError}">
        {{message}}
    </div>
    }

    <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" [(ngModel)]="registerData.username" placeholder="Ex: TraderPro99">
    </div>

    <div class="form-group">
        <label for="email">Email</label>
        <input type="text" id="email" [(ngModel)]="registerData.email" placeholder="name@email.com">
    </div>

    <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" [(ngModel)]="registerData.password" placeholder="Ex: Password123%">
    </div>

    <button class="btn-submit" (click)="onRegister()">Register</button>
    <p class="auth-link">
        Already have an account? <a routerLink="/login">Log in</a>
    </p>
</div>
